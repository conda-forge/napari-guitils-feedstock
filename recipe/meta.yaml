{% set name = "napari-guitils" %}
{% set version = "0.2.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/napari_guitils-{{ version }}.tar.gz
  sha256: ee1506106385cf9668cf9531ff63ef1094e90b39a86debdac2a6cb88a4bb8de7

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=42.0.0
    - wheel
    - setuptools-scm
    - pip
  run:
    - natsort
    - python >={{ python_min }}
    - qtpy

test:
  imports:
    - napari_guitils
  commands:
    - pip list
    - pip check
  requires:
    - pip
    - pyqt
    - python {{ python_min }}

about:
  home: https://pypi.org/project/napari-guitils
  summary: Utils to create napari guis
  license: BSD-3-Clause
  license_file: LICENSE
  dev_url: https://github.com/guiwitz/napari-guitils

extra:
  recipe-maintainers:
    - goanpeca
    - guiwitz
